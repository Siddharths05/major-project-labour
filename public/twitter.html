<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Twitter Checker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    #bgCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: linear-gradient(135deg, #0b1c2d, #00122f, #003366, #1DA1F2);
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center text-white">
  <!-- Background -->
  <canvas id="bgCanvas"></canvas>

  <!-- Foreground -->
  <div class="text-center bg-gray-900/80 p-10 rounded-2xl shadow-2xl">
    <h1 class="text-3xl font-bold text-blue-400 mb-6">Twitter Account Checker</h1>
    <form id="form" class="space-x-4">
      <input type="text" id="username" placeholder="Enter Twitter username"
             class="px-4 py-2 rounded bg-gray-700 text-white focus:ring-2 focus:ring-blue-400" required>
      <button type="submit" class="px-6 py-2 bg-blue-500 rounded hover:bg-blue-600">Check</button>
    </form>

    <!-- Result Container -->
    <div id="result" class="mt-6 text-lg hidden">
      <div class="bg-gray-800 p-4 rounded-lg shadow-lg inline-block">
        <span id="resultText"></span>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('form');
    const resultBox = document.getElementById('result');
    const resultText = document.getElementById('resultText');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      resultBox.classList.remove("hidden");
      resultText.innerHTML = "Checking... ⏳";
      try {
        const res = await fetch(`/check/${username}`);
        const data = await res.json();
        if (data.prediction === 1) {
          resultText.innerHTML = `<span class="text-red-400 font-bold">🚨 Fake/Bot Account</span>`;
        } else {
          resultText.innerHTML = `<span class="text-green-400 font-bold">✅ Real Account</span>`;
        }
      } catch (err) {
        resultText.innerHTML = `<span class="text-yellow-400">Error: ${err.message}</span>`;
      }
    });

    // Background Subtle Effect
    const canvas = document.getElementById("bgCanvas");
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    class FloatingCaptcha {
      constructor() {
        const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
        this.text = Array.from({length: 4}, () => chars[Math.floor(Math.random() * chars.length)]).join(" ");
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.speed = 0.15 + Math.random() * 0.25;
        this.opacity = 0.05 + Math.random() * 0.15;
        this.fontSize = 18 + Math.random() * 8;
        this.angle = (Math.random() - 0.5) * 0.15;
      }
      update() {
        this.y -= this.speed;
        if (this.y < -20) {
          this.y = canvas.height + 20;
          this.x = Math.random() * canvas.width;
        }
      }
      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        ctx.globalAlpha = this.opacity;
        ctx.font = `${this.fontSize}px monospace`;
        ctx.fillStyle = "#ccc";
        ctx.fillText(this.text, 0, 0);
        ctx.restore();
      }
    }

    const phrases = ["Are you human?", "Verification failed", "Select all images", "Try again"];
    class FloatingText {
      constructor() {
        this.text = phrases[Math.floor(Math.random() * phrases.length)];
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.opacity = 0.03 + Math.random() * 0.07;
        this.fontSize = 14 + Math.random() * 5;
      }
      draw() {
        ctx.save();
        ctx.globalAlpha = this.opacity;
        ctx.font = `${this.fontSize}px 'Inter', sans-serif`;
        ctx.fillStyle = "#aaa";
        ctx.fillText(this.text, this.x, this.y);
        ctx.restore();
      }
    }

    const captchas = Array.from({length: 6}, () => new FloatingCaptcha());
    const texts = Array.from({length: 6}, () => new FloatingText());

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      captchas.forEach(c => { c.update(); c.draw(); });
      texts.forEach(t => t.draw());
      requestAnimationFrame(animate);
    }
    animate();

    window.addEventListener("resize", () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>
</body>
</html>
